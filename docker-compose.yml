services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/data:/app/data
      - ./backend/tests:/app/tests
      - ./backend/scripts:/app/scripts
    env_file:
      - path: .env
        required: false
    environment:
      - PYTHONUNBUFFERED=1
      - UV_SYSTEM_PYTHON=1

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    depends_on:
      - backend
